# 0. 서버 포트 설정
server.port=8081

# 1. Database 연결 설정 (Docker 3307 포트)
spring.datasource.url=jdbc:mysql://localhost:3307/vibedb?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12341234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate 설정
# update: 엔티티 수정 시 DB 테이블에 자동으로 반영합니다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. 로그 레벨 설정 (SQL 쿼리를 콘솔에 예쁘게 찍어줍니다)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# 4. 파일 업로드 설정 (과제 제출용)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
file.upload.dir=uploads/assignments
